services:
  configservice:
    build:
      context: Apps/ConfigService
      dockerfile: Dockerfile
    environment:
      MODE: "Production"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      GATEWAY_URL: ${GATEWAY_URL}
    container_name: configservice
    networks:
      - primum-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: primum-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "4220:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - primum-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: primum-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "4210:5672"
      - "4211:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - primum-network

  signservice:
    build:
      context: Apps/SignService
      dockerfile: Dockerfile
    container_name: signservice
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
    networks:
      - primum-network
    depends_on:
      - configservice
      
  email-notification-service:
    build:
      context: Apps/EmailNotificationService
      dockerfile: Dockerfile
    container_name: email-notification-service
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
      MODE: "Production"
      EMAIL: ${EMAIL}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    networks:
      - primum-network
    depends_on:
      - configservice
      
  chat-bot-notification-service:
    build:
      context: Apps/ChatBotNotificationService
      dockerfile: Dockerfile
    container_name: chat-bot-notification-service
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
      MODE: "Production"
    networks:
      - primum-network
    depends_on:
      - configservice

  primumcore:
    build:
      context: .
      dockerfile: Apps/PrimumCore/Dockerfile
    container_name: primumcore
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - configservice
      - sqlserver
      - rabbitmq
    networks:
      - primum-network

  primumwebapi:
    build:
      context: .
      dockerfile: Apps/PrimumWebAPI/Dockerfile
    container_name: primumwebapi
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
      ASPNETCORE_ENVIRONMENT: Production
      WEBAPI_JWT_ISSUER: ${WEBAPI_JWT_ISSUER}
      WEBAPI_JWT_SEED: ${WEBAPI_JWT_SEED}
      WEBAPI_JWT_AUDIENCE: ${WEBAPI_JWT_AUDIENCE}
      WEBAPI_JWT_LIFETIME_MINUTES: ${WEBAPI_JWT_LIFETIME_MINUTES}
    ports:
      - "4200:5002"
    depends_on:
      - configservice
    networks:
      - primum-network

  botcore:
    build:
      context: .
      dockerfile: Apps/BotCore/Dockerfile
    container_name: botcore
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5003:5003"
    depends_on:
      - configservice
    networks:
      - primum-network

  coredbiterator:
    build:
      context: .
      dockerfile: Apps/CoreDBIterator/Dockerfile
    container_name: coredbiterator
    environment:
      CONFIG_SERVICE_URL: ${CONFIGSERVICE_URL}
    depends_on:
      - configservice
      - sqlserver
    networks:
      - primum-network

networks:
  primum-network:
    driver: bridge

volumes:
  sqlserver-data:
  rabbitmq-data:
